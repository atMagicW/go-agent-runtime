default_model: "gpt-4.1-mini"

task_type_to_tag:
  intent: "intent"
  llm_generate: "chat"
  llm_analyze: "analysis"
  retrieve_answer: "retrieval_answer"
  analysis: "analysis"
  write: "write"
  reasoning: "reasoning"

models:
  - name: "gpt-4.1"
    provider: "openai"
    enabled: true
    tags: ["analysis", "retrieval_answer", "write"]

  - name: "gpt-4.1-mini"
    provider: "openai"
    enabled: true
    tags: ["intent", "chat", "low_cost"]

  - name: "deepseek-chat"
    provider: "deepseek"
    enabled: true
    tags: ["chat", "write", "retrieval_answer", "low_cost"]

  - name: "deepseek-reasoner"
    provider: "deepseek"
    enabled: true
    tags: ["analysis", "reasoning"]